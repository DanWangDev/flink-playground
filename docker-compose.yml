services:
  jobmanager:
    image: flink:2.0-scala_2.12-java17
    ports:
      - "8081:8081"
      - "6123:6123"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        parallelism.default: 1
        taskmanager.numberOfTaskSlots: 2
        state.backend.type: hashmap
    volumes:
      - ./data:/opt/flink/data
      - ./conf/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
    healthcheck:
      test: curl -s http://localhost:8081/overview | grep -q '"taskmanagers"'
      interval: 5s
      timeout: 3s
      retries: 30

  taskmanager:
    image: flink:2.0-scala_2.12-java17
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./data:/opt/flink/data

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 5s
      timeout: 5s
      retries: 20
